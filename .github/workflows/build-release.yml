name: Build and Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies and zip
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends python3 python3-pip zip
          pip3 install pillow pycdlib --break-system-packages \
            || pip3 install pillow pycdlib

      - name: Build ELF
        run: make

      - name: Create ISO
        run: make iso

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package ELF into ZIP
        run: |
          [ -f game_engine.elf ] || { echo "ERROR: game_engine.elf not found"; exit 1; }
          zip game_engine_${{ steps.vars.outputs.sha_short }}.zip game_engine.elf
          for f in sprites.pak audsrv.irx freesd.irx; do
            [ -f "$f" ] && zip game_engine_${{ steps.vars.outputs.sha_short }}.zip "$f"
          done

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          prerelease: false
          body: |
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Triggered by:** ${{ github.event.head_commit.message }}

            ### Artifacts
            - `game_engine_*.zip` — ELF binary + supporting files (sprites.pak, IRX modules)
            - `*.iso` — PS2-bootable ISO image (ISO 9660 + UDF, ESR Patcher compatible)
          artifacts: "game_engine_${{ steps.vars.outputs.sha_short }}.zip,*.iso"
          token: ${{ secrets.GITHUB_TOKEN }}
